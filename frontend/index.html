<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugHunt Arena</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#16120c; --panel:#1e1810; --panel-2:#241d13; --line:#3a2f1d;
  --amber:#e8a33d; --amber-dim:#a97a2f; --amber-soft:#f4d9a6;
  --green:#7dd87d; --red:#e05d44; --yellow:#e8d33d;
  --ink:#d8cbb3; --ink-dim:#8d8066;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body { background:var(--bg); color:var(--ink); font-family:'IBM Plex Mono',monospace; font-size:14px; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:99;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.10) 2px 3px); }
@media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }
a { color:var(--amber); text-decoration:none; }
button { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600;
  padding:9px 16px; cursor:pointer; border:1px solid var(--amber);
  background:transparent; color:var(--amber); transition:background .15s,color .15s; }
button:hover, button:focus-visible { background:var(--amber); color:var(--bg); outline:none; }
button.ghost { border-color:var(--line); color:var(--ink-dim); }
button.ghost:hover { background:var(--panel-2); color:var(--ink); }
button:disabled { opacity:.35; cursor:not-allowed; }
select, input[type=text], textarea.field {
  background:var(--panel-2); color:var(--amber-soft); border:1px solid var(--line);
  font-family:'IBM Plex Mono',monospace; font-size:13px; padding:8px 10px; }
select:focus, input[type=text]:focus, textarea.field:focus { outline:1px solid var(--amber-dim); }
h2 { font-family:'VT323',monospace; font-size:21px; color:var(--amber-dim);
  text-transform:uppercase; letter-spacing:2px; margin-bottom:14px; }
h2 small { font-size:13px; letter-spacing:0; color:var(--ink-dim); text-transform:none;
  font-family:'IBM Plex Mono',monospace; }

/* ---------- Header ---------- */
header { display:flex; align-items:center; gap:16px;
  padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel);
  position:sticky; top:0; z-index:50; }
#burger { display:none; padding:6px 12px; font-size:16px; }
.logo { font-family:'VT323',monospace; font-size:28px; color:var(--amber);
  letter-spacing:1px; cursor:pointer; user-select:none; }
.logo .blink { animation:blink 1.2s steps(1) infinite; }
@keyframes blink { 50% { opacity:0; } }
.hstats { margin-left:auto; display:flex; gap:18px; font-size:12px; color:var(--ink-dim); align-items:center; }
.hstats b { color:var(--amber-soft); }
.lvlbar { width:110px; height:8px; background:var(--panel-2); border:1px solid var(--line); position:relative; }
.lvlbar span { position:absolute; inset:0; background:var(--amber); transform-origin:left; }

/* ---------- Layout com sidebar ---------- */
.shell { display:grid; grid-template-columns:210px 1fr; min-height:calc(100vh - 57px); }
nav.side { border-right:1px solid var(--line); background:var(--panel); padding:16px 0; }
nav.side a { display:flex; align-items:center; gap:10px; padding:11px 20px;
  color:var(--ink-dim); font-size:13px; border-left:3px solid transparent; }
nav.side a:hover { color:var(--ink); background:var(--panel-2); }
nav.side a.active { color:var(--amber); border-left-color:var(--amber); background:var(--panel-2); }
nav.side .sep { border-top:1px solid var(--line); margin:12px 20px; }
nav.side .ico { font-family:'VT323',monospace; font-size:17px; width:20px; text-align:center; }
main { padding:26px 26px 70px; max-width:1050px; }
@media (max-width:900px){
  .shell { grid-template-columns:1fr; }
  nav.side { display:none; position:fixed; top:57px; left:0; bottom:0; width:220px; z-index:60; }
  nav.side.open { display:block; }
  #burger { display:block; }
}

/* ---------- Home ---------- */
.hero { text-align:center; padding:26px 0 24px; }
.hero h1 { font-family:'VT323',monospace; font-size:42px; color:var(--amber); letter-spacing:2px; }
.hero p { color:var(--ink-dim); max-width:560px; margin:10px auto 0; line-height:1.6; }
.areas { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-top:24px; }
.area-card { border:1px solid var(--line); background:var(--panel); padding:20px;
  cursor:pointer; position:relative; transition:border-color .15s; }
.area-card:hover, .area-card:focus-visible { border-color:var(--amber); outline:none; }
.area-card .icon { font-family:'VT323',monospace; font-size:32px; color:var(--amber); }
.area-card h3 { font-size:15px; color:var(--amber-soft); margin:8px 0 6px; }
.area-card p { font-size:12px; color:var(--ink-dim); line-height:1.5; }
.area-card .count { position:absolute; top:14px; right:16px; font-size:11px; color:var(--amber-dim); }

/* ---------- Área / cards ---------- */
.crumb { font-size:12px; color:var(--ink-dim); margin-bottom:16px; }
.langs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.lang-chip { border:1px solid var(--line); padding:7px 14px; font-size:12px;
  cursor:pointer; color:var(--ink-dim); background:var(--panel); }
.lang-chip.active { border-color:var(--amber); color:var(--amber); }
.lang-chip.soon { opacity:.4; cursor:not-allowed; }
.lang-chip.soon::after { content:' · em breve'; font-size:10px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; }
.card { border:1px solid var(--line); background:var(--panel); padding:14px 16px;
  cursor:pointer; position:relative; transition:border-color .15s; }
.card:hover, .card:focus-visible { border-color:var(--amber-dim); outline:none; }
.card .tag { position:absolute; top:-1px; right:12px; background:var(--amber); color:var(--bg);
  font-size:10px; font-weight:600; padding:2px 8px 4px;
  clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%); }
.card.gen .tag { background:var(--green); }
.card h3 { font-size:14px; color:var(--amber-soft); margin-bottom:5px; padding-right:82px; }
.card .meta { font-size:11px; color:var(--ink-dim); display:flex; gap:12px; }
.card.solved h3::after { content:' ✓'; color:var(--green); }
.pips { letter-spacing:2px; color:var(--amber); }
.gen-bar { margin-top:22px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.gen-bar .note { font-size:11px; color:var(--ink-dim); }

/* ---------- Arena ---------- */
.arena { display:grid; grid-template-columns:1fr 330px; gap:18px; align-items:start; }
@media (max-width:1150px){ .arena { grid-template-columns:1fr; } .mentor-panel { position:static!important; height:420px!important; } }
.brief { border-left:3px solid var(--amber); padding:11px 15px; background:var(--panel);
  font-size:13px; line-height:1.55; margin-bottom:14px; }
.brief b { color:var(--amber-soft); }
textarea#editor { width:100%; min-height:290px; resize:vertical;
  background:var(--panel-2); color:var(--amber-soft); border:1px solid var(--line);
  padding:14px; font-family:'IBM Plex Mono',monospace; font-size:13px;
  line-height:1.6; tab-size:4; caret-color:var(--amber); }
textarea#editor:focus { outline:1px solid var(--amber-dim); }
.actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:12px 0; }
.hint-cost { font-size:11px; color:var(--ink-dim); }
.terminal { background:#0d1208; border:1px solid #23301c; padding:13px;
  min-height:120px; max-height:250px; overflow-y:auto; font-size:13px;
  line-height:1.6; color:var(--green); white-space:pre-wrap; word-break:break-word; }
.terminal .err { color:var(--red); }
.terminal .sys { color:var(--ink-dim); }
.terminal .ok::before { content:'▮ '; }
.term-head { display:flex; align-items:center; gap:12px; margin-bottom:6px; flex-wrap:wrap; }
.term-head .label { font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:1px; }
.term-head select { padding:4px 8px; font-size:12px; }
.term-head button { padding:4px 10px; font-size:11px; margin-left:auto; }

/* ---------- Chat mentor ---------- */
.mentor-panel { border:1px solid var(--line); background:var(--panel);
  display:flex; flex-direction:column; height:560px; position:sticky; top:76px; }
.mentor-panel .head { font-family:'VT323',monospace; font-size:19px; color:var(--amber);
  letter-spacing:1px; padding:12px 16px; border-bottom:1px solid var(--line); }
.mentor-panel .head small { font-size:12px; color:var(--ink-dim);
  font-family:'IBM Plex Mono',monospace; letter-spacing:0; display:block; }
.chat { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
.msg { max-width:88%; padding:9px 12px; font-size:12.5px; line-height:1.55; }
.msg.mentor { background:var(--panel-2); border-left:3px solid var(--amber); align-self:flex-start; }
.msg.user { background:#231f14; border-right:3px solid var(--ink-dim);
  align-self:flex-end; color:var(--amber-soft); }
.msg .lvl { display:block; font-size:10px; color:var(--amber-dim);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
.chat-input { display:flex; border-top:1px solid var(--line); }
.chat-input input { flex:1; border:none; min-width:0; }
.chat-input button { border:none; border-left:1px solid var(--line); }
.typing { font-size:11px; color:var(--ink-dim); padding:0 16px 8px; display:none; }
.typing.on { display:block; }

/* ---------- Painéis genéricos ---------- */
section.panel { background:var(--panel); border:1px solid var(--line); padding:18px; margin-bottom:20px; }
table.t { width:100%; border-collapse:collapse; font-size:13px; }
table.t th { text-align:left; padding:8px 12px; color:var(--ink-dim);
  font-size:11px; text-transform:uppercase; letter-spacing:1px; font-weight:500; }
table.t td { padding:9px 12px; border-top:1px solid var(--line); }
table.t td.num, table.t th.num { text-align:right; }
.bar { display:inline-block; height:11px; vertical-align:middle; margin-right:8px; }

/* ---------- Comunidade ---------- */
.post { border:1px solid var(--line); background:var(--panel); padding:14px 16px; margin-bottom:14px; }
.post .phead { display:flex; gap:12px; align-items:baseline; flex-wrap:wrap; }
.post .phead b { color:var(--amber-soft); }
.post .phead .by { font-size:11px; color:var(--ink-dim); }
.post pre { background:var(--panel-2); border:1px solid var(--line); padding:10px 12px;
  margin:10px 0; font-size:12px; overflow-x:auto; color:var(--amber-soft); line-height:1.5; }
.post .pdesc { font-size:12.5px; line-height:1.55; }
.post .pfoot { display:flex; gap:16px; font-size:11px; color:var(--ink-dim); margin-top:10px; }
.post .pfoot button { padding:3px 10px; font-size:11px; }
.reply { border-left:3px solid var(--line); margin:10px 0 0 14px; padding:8px 12px;
  background:var(--panel-2); font-size:12px; line-height:1.5; }
.reply b { color:var(--green); }
.newpost { display:grid; gap:10px; }
.newpost textarea.field { min-height:120px; resize:vertical; }
.newpost .row { display:flex; gap:10px; flex-wrap:wrap; }
.newpost .row input { flex:1; min-width:160px; }

/* ---------- Perfil ---------- */
.profile-top { display:flex; gap:22px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
.avatar { width:76px; height:76px; border:2px solid var(--amber); display:grid; place-items:center;
  font-family:'VT323',monospace; font-size:34px; color:var(--amber);
  clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%); background:var(--panel-2); }
.profile-top h1 { font-family:'VT323',monospace; font-size:30px; color:var(--amber-soft); }
.profile-top .sub { font-size:12px; color:var(--ink-dim); }
.bigbar { height:14px; background:var(--panel-2); border:1px solid var(--line); position:relative; margin-top:8px; }
.bigbar span { position:absolute; inset:0; background:var(--amber); transform-origin:left; }
.bigbar .txt { position:absolute; right:6px; top:-19px; font-size:11px; color:var(--ink-dim); }
.langrow { display:grid; grid-template-columns:110px 1fr 60px; gap:12px; align-items:center;
  padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; }
.langrow:last-child { border-bottom:none; }
.langrow .lb { height:10px; background:var(--panel-2); border:1px solid var(--line); position:relative; }
.langrow .lb span { position:absolute; inset:0; transform-origin:left; background:var(--amber); }
.badges { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
.badge { border:1px solid var(--line); background:var(--panel-2); padding:12px 14px; }
.badge.locked { opacity:.35; filter:grayscale(1); }
.badge .bt { color:var(--amber); font-size:13px; font-weight:600; }
.badge .bd { font-size:11px; color:var(--ink-dim); margin-top:3px; line-height:1.4; }

/* ---------- Caderno ---------- */
.diary-row { display:flex; gap:14px; align-items:center; padding:10px 4px; border-bottom:1px solid var(--line); }
.diary-row:last-child { border-bottom:none; }
.diary-row .cc { min-width:150px; color:var(--amber-soft); }
.diary-row .note { flex:1; font-size:12px; color:var(--ink-dim); line-height:1.5; }
.diary-row .rt { color:var(--red); font-weight:600; min-width:70px; text-align:right; }
.mynotes .n { border-left:3px solid var(--amber-dim); background:var(--panel-2);
  padding:9px 12px; margin-bottom:8px; font-size:12.5px; line-height:1.5; white-space:pre-wrap; }
.addnote { display:flex; gap:10px; margin-top:12px; }
.addnote input { flex:1; }
.empty { color:var(--ink-dim); font-style:italic; padding:6px 2px; font-size:13px; }

/* ---------- Modal level-up ---------- */
.overlay { position:fixed; inset:0; background:rgba(10,8,5,.82); z-index:100;
  display:none; place-items:center; padding:20px; }
.overlay.on { display:grid; }
.modal { background:var(--panel); border:1px solid var(--amber); max-width:520px; width:100%;
  padding:24px 26px; }
.modal h3 { font-family:'VT323',monospace; font-size:30px; color:var(--amber);
  letter-spacing:2px; margin-bottom:4px; }
.modal .sum { font-size:13px; line-height:1.6; color:var(--ink); margin:10px 0 14px; }
.modal .nx { border-left:3px solid var(--green); background:var(--panel-2);
  padding:10px 14px; font-size:12.5px; line-height:1.6; margin-bottom:8px; }
.modal .nx b { color:var(--green); }
.modal .foot { display:flex; justify-content:flex-end; margin-top:14px; }

/* ---------- Toast ---------- */
#toasts { position:fixed; bottom:18px; right:18px; z-index:110; display:flex;
  flex-direction:column; gap:8px; }
.toast { background:var(--panel); border:1px solid var(--green); color:var(--ink);
  padding:11px 15px; font-size:12.5px; max-width:300px; animation:pop .2s ease-out; }
.toast b { color:var(--green); }
@keyframes pop { from { transform:translateY(8px); opacity:0; } }
</style>
</head>
<body>

<header>
  <button id="burger" class="ghost" aria-label="Abrir menu">☰</button>
  <div class="logo" id="logo" role="link" tabindex="0" aria-label="Ir para a página principal">BUGHUNT ARENA<span class="blink">_</span></div>
  <div class="hstats">
    <span>streak <b>3🔥</b></span>
    <span>xp <b id="hxp">450</b></span>
    <span>nível <b id="hlvl">3</b></span>
    <div class="lvlbar" title="progresso para o próximo nível"><span id="hbar"></span></div>
  </div>
</header>

<div class="shell">
  <nav class="side" id="side">
    <a href="#/" data-r=""><span class="ico">▲</span>Arena</a>
    <a href="#/caderno" data-r="caderno"><span class="ico">✎</span>Caderno de Estudo</a>
    <a href="#/comunidade" data-r="comunidade"><span class="ico">☷</span>Comunidade</a>
    <a href="#/perfil" data-r="perfil"><span class="ico">◆</span>O Meu Perfil</a>
    <div class="sep"></div>
    <a href="#/professor" data-r="professor"><span class="ico">⌂</span>Painel do Professor</a>
  </nav>
  <main id="app"></main>
</div>

<div class="overlay" id="lvl-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="lvl-modal"></div>
</div>
<div id="toasts"></div>

<script>
/* ================= CONFIG ================= */
const DEMO = true;
const API = 'http://localhost:8080/api';

/* ================= DADOS ================= */
const AREAS = [
  { id:'backend',  icon:'{ }', title:'Backend',
    desc:'Java, C#, Python — objetos, coleções, exceções e os bugs do lado do servidor.',
    langs:['JAVA','PYTHON','CSHARP','KOTLIN'] },
  { id:'logica',   icon:'if?', title:'Lógica e Algoritmos',
    desc:'Ciclos, condições, recursividade — onde nascem os off-by-one.',
    langs:['JAVA','PYTHON','JAVASCRIPT'] },
  { id:'seguranca',icon:'🔒',  title:'Segurança',
    desc:'SQL injection, segredos, validação de input, cloud e firewalls — Secure by Design.',
    langs:['PYTHON','JAVA','CONFIG'] },
  { id:'web',      icon:'</>', title:'Web',
    desc:'JavaScript, DOM, closures — os bugs que só acontecem no browser.',
    langs:['JAVASCRIPT'] },
  { id:'dados',    icon:'SQL', title:'Bases de Dados',
    desc:'Consultas, JOINs, transações.',
    langs:['SQL'] },
];
const SANDBOX_READY = ['JAVA','PYTHON','JAVASCRIPT'];
const LANG_LABEL = l => l==='CSHARP'?'C#':l==='CONFIG'?'Config':l.charAt(0)+l.slice(1).toLowerCase();

const CHALLENGES = [
  { id:'off-by-one-01', area:'logica', title:'O array rebelde', concept:'ciclos',
    difficulty:1, points:100, language:'JAVA',
    description:'Devia imprimir a soma dos elementos do array, mas rebenta com uma exceção. Encontra e corrige o bug. (Este desafio existe em 3 linguagens — muda no seletor da consola.)',
    buggyCode:`public class Main {
    public static void main(String[] args) {
        int[] numeros = {10, 20, 30, 40, 50};
        int soma = 0;
        for (int i = 0; i <= numeros.length; i++) {
            soma += numeros[i];
        }
        System.out.println("Soma: " + soma);
    }
}`,
    solvedIf: c => /i\s*<\s*numeros\.length/.test(c) && !c.includes('<='),
    expected:'Soma: 150',
    bugOutput:'Exception in thread "main" java.lang.ArrayIndexOutOfBoundsException: Index 5 out of bounds for length 5',
    hints:[
      'Quantas posições tem um array de 5 elementos — e qual é o índice da última?',
      'Olha para a condição de paragem do ciclo for.',
      'Em Java, os índices vão de 0 a length-1. Uma condição i <= length lê uma posição a mais.',
      'A condição i <= numeros.length permite i=5, mas o último índice válido é 4. Troca <= por <.'],
    variants:{
      PYTHON:{
        buggyCode:`numeros = [10, 20, 30, 40, 50]
soma = 0
for i in range(len(numeros) + 1):
    soma += numeros[i]
print("Soma:", soma)`,
        solvedIf: c => /range\(\s*len\(numeros\)\s*\)/.test(c),
        expected:'Soma: 150',
        bugOutput:'IndexError: list index out of range'},
      JAVASCRIPT:{
        buggyCode:`const numeros = [10, 20, 30, 40, 50];
let soma = 0;
for (let i = 0; i <= numeros.length; i++) {
    soma += numeros[i];
}
console.log("Soma: " + soma);`,
        solvedIf: c => /i\s*<\s*numeros\.length/.test(c) && !c.includes('<='),
        expected:'Soma: 150',
        bugOutput:'Soma: NaN'}
    }},
  { id:'string-compare-01', area:'backend', title:'Iguais mas diferentes', concept:'strings',
    difficulty:1, points:100, language:'JAVA',
    description:'O login devia aceitar a password correta, mas rejeita sempre. (Em Java, nem tudo o que parece igual É igual.)',
    buggyCode:`public class Main {
    public static void main(String[] args) {
        String passwordCorreta = new String("bughunt2026");
        String tentativa = new String("bughunt2026");
        if (passwordCorreta == tentativa) {
            System.out.println("Acesso concedido");
        } else {
            System.out.println("Acesso negado");
        }
    }
}`,
    solvedIf: c => c.includes('.equals('),
    expected:'Acesso concedido', bugOutput:'Acesso negado',
    hints:[
      'O que compara o operador == quando os operandos são objetos?',
      'O problema está na condição do if.',
      'Em Java, == compara referências de memória; dois new String() nunca são a mesma referência.',
      'Usa passwordCorreta.equals(tentativa) para comparar conteúdo.']},
  { id:'mutable-default-01', area:'backend', title:'A lista fantasma', concept:'funcoes',
    difficulty:2, points:150, language:'PYTHON',
    description:'Cada chamada devia criar uma lista nova, mas os itens acumulam-se. Um dos bugs mais famosos de Python.',
    buggyCode:`def adicionar_item(item, lista=[]):
    lista.append(item)
    return lista

print(adicionar_item("a"))
print(adicionar_item("b"))
print(adicionar_item("c"))`,
    solvedIf: c => c.includes('lista=None') || c.includes('lista = None'),
    expected:"['a']\n['b']\n['c']", bugOutput:"['a']\n['a', 'b']\n['a', 'b', 'c']",
    hints:[
      'Quando é criado o valor default de um parâmetro em Python — em cada chamada, ou uma vez?',
      'O problema está na assinatura da função.',
      'Defaults mutáveis são avaliados UMA vez. Todas as chamadas partilham a mesma lista.',
      'Usa lista=None e: if lista is None: lista = [].']},
  { id:'closure-loop-01', area:'web', title:'Todos ao mesmo tempo', concept:'closures',
    difficulty:2, points:150, language:'JAVASCRIPT',
    description:'Devia imprimir 0, 1, 2 — mas imprime 3, 3, 3. Um clássico de scoping em JavaScript.',
    buggyCode:`const funcoes = [];
for (var i = 0; i < 3; i++) {
    funcoes.push(function() { console.log(i); });
}
funcoes.forEach(f => f());`,

/* ================= GERADOR IA (demo) ================= */
function demoGenerateChallenge(area){
  const n = 4 + Math.floor(Math.random()*3);
  const vals = Array.from({length:n}, () => (1+Math.floor(Math.random()*9))*10);
  const sum = vals.reduce((a,b)=>a+b,0);
  const id = 'gen-' + Math.random().toString(36).slice(2,7);
  return {
    id, area, generated:true, title:'Variação IA: a soma fugitiva',
    concept:'ciclos', difficulty:1, points:100, language:'JAVA',
    description:`[gerado por IA · validado no sandbox] Soma os ${n} elementos do array — mas há um bug à espera.`,
    buggyCode:`public class Main {
    public static void main(String[] args) {
        int[] valores = {${vals.join(', ')}};
        int total = 0;
        for (int i = 0; i <= valores.length; i++) {
            total += valores[i];
        }
        System.out.println("Total: " + total);
    }
}`,
    solvedIf: c => /i\s*<\s*valores\.length/.test(c) && !c.includes('<='),
    expected:'Total: ' + sum,
    bugOutput:'Exception in thread "main" java.lang.ArrayIndexOutOfBoundsException: Index ' + n + ' out of bounds for length ' + n,
    hints:[
      'Qual é o índice do último elemento de um array com ' + n + ' posições?',
      'Repara na condição de paragem do for.',
      'i <= length lê uma posição além do fim.',
      'Troca <= por < na condição do ciclo.']};
}

function playerStats(){

    securitySolved:state.securitySolved, langXp:state.langXp, maxFails:state.maxFails };
}
function allChallenges(){ return [...CHALLENGES, ...state.generated]; }

/* ================= UI HELPERS ================= */
const app = document.getElementById('app');
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function toast(html){
  const t = document.createElement('div');
  t.className = 'toast'; t.innerHTML = html;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 4200);
}
function updateHeader(){
  const lvl = levelForXp(state.xp);
  const cur = xpForLevel(lvl), next = xpForLevel(lvl+1);
  document.getElementById('hxp').textContent = state.xp;
  document.getElementById('hlvl').textContent = lvl;
  document.getElementById('hbar').style.transform =
    'scaleX(' + Math.min((state.xp-cur)/(next-cur),1) + ')';
}
function checkBadges(){
  const s = playerStats();
  BADGES.forEach(b => {
    if(!state.earned.has(b.id) && b.check(s)){
      state.earned.add(b.id);
      toast('<b>🏅 conquista desbloqueada</b><br>' + b.title + ' — ' + b.desc);
    }
  });
}
function grantXp(pts, lang){
  const before = levelForXp(state.xp);
  state.xp += pts;
  if(lang && state.langXp[lang] !== undefined) state.langXp[lang] += pts;
  updateHeader();
  const after = levelForXp(state.xp);
  if(after > before) showLevelUp(after);
}
function recordAttempt(concept, ok){
  const e = state.errors[concept] || (state.errors[concept] = {attempts:0, errors:0, last:null});
  e.attempts++;
  if(!ok){ e.errors++; e.last = new Date().toLocaleDateString('pt-PT'); }
}

/* ---------- Modal level-up: resumo do passado + próximos passos ---------- */
function showLevelUp(level){
  const solvedList = [...state.solved].slice(-4).join(', ') || 'vários desafios';
  const worst = Object.entries(state.errors)
      .filter(([,e])=>e.errors>0)
      .sort((a,b)=>b[1].errors-a[1].errors)[0];
  const advice = (LEVEL_ADVICE[level] || { next:[
      ['Continua o trilho','Desbloqueia os próximos conceitos na tua área mais forte — e espreita uma área nova.']]}).next;

  document.getElementById('lvl-modal').innerHTML = `
    <h3>NÍVEL ${level} ★</h3>
    <div class="sum">
      <b style="color:var(--amber-soft)">O caminho até aqui:</b> resolveste ${state.totalSolved}
      desafio${state.totalSolved===1?'':'s'} (${solvedList}).
      ${worst ? `O conceito que mais te desafiou foi <b style="color:var(--red)">#${worst[0]}</b>
      (${worst[1].errors} erro${worst[1].errors===1?'':'s'}) — já está no teu caderno para revisão.` :
      'Sem padrões de erro preocupantes — caçada limpa.'}
    </div>
    ${advice.map(([t,d]) => `<div class="nx"><b>→ ${t}</b><br>${d}</div>`).join('')}
    <div class="foot"><button id="lvl-close">continuar a caçada</button></div>`;
  document.getElementById('lvl-overlay').classList.add('on');
  document.getElementById('lvl-close').onclick = () =>
    document.getElementById('lvl-overlay').classList.remove('on');
}

function route(){
  const h = location.hash || '#/';
  const parts = h.slice(2).split('/');
  const r = parts[0] || '';
  document.querySelectorAll('nav.side a').forEach(a =>
    a.classList.toggle('active', a.dataset.r === (['area','arena'].includes(r) ? '' : r)));
  document.getElementById('side').classList.remove('open');
  if (r==='')                 renderHome();
  else if (r==='area')        renderArea(parts[1]);
  else if (r==='arena')       renderArena(parts[1]);
  else if (r==='professor')   renderProfessor();
  else if (r==='caderno')     renderCaderno();
  else if (r==='comunidade')  renderComunidade();
  else if (r==='perfil')      renderPerfil();
  else renderHome();
  window.scrollTo(0,0);
}

/* ================= ÁREA ================= */
function renderArea(areaId){
  const area = AREAS.find(a => a.id===areaId);
  if(!area) return renderHome();
  let activeLang = null;

  app.innerHTML = `
    <div class="crumb"><a href="#/">arena</a> / ${area.title.toLowerCase()}</div>
    <h2>${area.title}</h2>
    <div class="langs">${area.langs.map(l => {
      const ready = SANDBOX_READY.includes(l);
      return `<span class="lang-chip ${ready?'':'soon'}" data-lang="${l}" ${ready?'tabindex="0"':''}>${LANG_LABEL(l)}</span>`;
    }).join('')}</div>
    <div class="grid" id="grid"></div>
    <div class="gen-bar">
      <button id="gen">⚡ Gerar desafio novo (IA)</button>
      <span class="note">a IA gera uma variação; o sandbox valida-a antes de a mostrar aos alunos</span>
    </div>`;

  const grid = document.getElementById('grid');
  function refresh(){
    const list = allChallenges().filter(c => c.area===areaId &&
        (!activeLang || c.language===activeLang ||
         (c.variants && c.variants[activeLang])));
    grid.innerHTML = list.length ? list.map(c => `
      <div class="card ${state.solved.has(c.id)?'solved':''} ${c.generated?'gen':''}"
           tabindex="0" role="link" data-id="${c.id}">
        <span class="tag">${c.generated?'IA · ':''}${LANG_LABEL(c.language)}${c.variants?' +':''}</span>
        <h3>${c.title}</h3>
        <div class="meta">
          <span class="pips">${'◆'.repeat(c.difficulty)}${'◇'.repeat(5-c.difficulty)}</span>
          <span>${c.points} pts</span><span>#${c.concept}</span>
        </div>
      </div>`).join('')
      : '<p class="empty">Sem desafios para este filtro — gera um com a IA ⚡</p>';
    grid.querySelectorAll('.card').forEach(el => {
      const go = () => location.hash = '#/arena/' + el.dataset.id;
      el.onclick = go;
      el.onkeydown = e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } };
    });
  }
  refresh();

  app.querySelectorAll('.lang-chip:not(.soon)').forEach(chip => {
    chip.onclick = () => {
      activeLang = activeLang===chip.dataset.lang ? null : chip.dataset.lang;
      app.querySelectorAll('.lang-chip').forEach(c =>
        c.classList.toggle('active', c.dataset.lang===activeLang));
      refresh();
    };
  });

  document.getElementById('gen').onclick = async function(){
    this.disabled = true; this.textContent = '⚡ a gerar e validar no sandbox…';
    try {
      if(DEMO){
        await new Promise(r => setTimeout(r, 1400));
        state.generated.push(demoGenerateChallenge(areaId));
      } else {
        const res = await fetch(`${API}/generator/${areaId}`, { method:'POST' });
        if(!res.ok) throw new Error();
        state.generated.push(await res.json());
      }
      refresh();
    } catch(e){ toast('<b>⚠</b> geração falhou — tenta outra vez'); }
    finally { this.disabled = false; this.textContent = '⚡ Gerar desafio novo (IA)'; }
  };
}

function renderArena(challengeId){
  const c = allChallenges().find(x => x.id===challengeId);
  if(!c) return renderHome();
  let hintsUsed = 0, failedAttempts = 0;
  let activeLang = c.language;
  let active = { buggyCode:c.buggyCode, solvedIf:c.solvedIf,
                 expected:c.expected, bugOutput:c.bugOutput };

  const langOptions = [c.language, ...(c.variants ? Object.keys(c.variants) : [])];

  app.innerHTML = `
    <div class="crumb"><a href="#/">arena</a> / <a href="#/area/${c.area}">${c.area}</a> / ${c.id}</div>
    <div class="arena">
      <div>
        <div class="brief"><b>${c.title}</b> — ${c.description}</div>
        <textarea id="editor" spellcheck="false" aria-label="Editor de código"></textarea>
        <div class="actions">
          <button id="run">Executar no sandbox</button>
          <span class="hint-cost" id="hint-info"></span>
        </div>
        <div class="term-head">
          <span class="label">consola · sandbox</span>
          <select id="lang-select" aria-label="Linguagem do sandbox" ${langOptions.length===1?'disabled title="este desafio só existe numa linguagem"':''}>
            ${langOptions.map(l => `<option value="${l}">${LANG_LABEL(l)}</option>`).join('')}
          </select>
          <button class="ghost" id="clear">limpar consola</button>
        </div>
        <div class="terminal" id="terminal"></div>
      </div>
      <div class="mentor-panel">
        <div class="head">MENTOR<small>faz perguntas — ele responde à socrática</small></div>
        <div class="chat" id="chat"></div>
        <div class="typing" id="typing">mentor a escrever…</div>
        <div class="chat-input">
          <input id="chat-in" placeholder="escreve a tua dúvida…" aria-label="Mensagem para o mentor">
          <button id="chat-send" aria-label="Enviar mensagem">›</button>
          <button id="chat-hint" class="ghost" title="Pedir a próxima dica">dica</button>
        </div>
      </div>
    </div>`;

  const editor = document.getElementById('editor');
  const termEl = document.getElementById('terminal');
  const chatEl = document.getElementById('chat');
  const typingEl = document.getElementById('typing');

  function term(text, cls){
    const d = document.createElement('div');
    if(cls) d.className = cls;
    d.textContent = text;
    termEl.appendChild(d); termEl.scrollTop = termEl.scrollHeight;
  }
  function sandboxBanner(){
    term(`sandbox pronto — ${LANG_LABEL(activeLang)} · 256MB · 0.5 CPU · sem rede · timeout 10s`, 'sys');
  }
  function loadLang(lang){
    activeLang = lang;
    const v = lang === c.language ? c : c.variants[lang];
    active = { buggyCode:v.buggyCode, solvedIf:v.solvedIf,
               expected:v.expected, bugOutput:v.bugOutput };
    editor.value = active.buggyCode;
    sandboxBanner();
  }
  loadLang(c.language);

  document.getElementById('lang-select').onchange = e => {
    term('> a trocar imagem do sandbox…', 'sys');
    loadLang(e.target.value);
  };
  document.getElementById('clear').onclick = () => {
    termEl.innerHTML = '';
    sandboxBanner();
  };

  const LEVEL_NAMES = ['pergunta socrática','pista de localização','conceito','explicação direta'];
  function updateHintInfo(){
    document.getElementById('hint-info').textContent =
      `dicas: ${hintsUsed} · próxima: ${LEVEL_NAMES[Math.min(hintsUsed,3)]} · cada dica custa 20%`;
  }
  updateHintInfo();

  function chatMsg(text, who, lvl){
    const d = document.createElement('div');
    d.className = 'msg ' + who;
    d.innerHTML = (lvl?`<span class="lvl">${lvl}</span>`:'') + escapeHtml(text);
    chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
  }
  chatMsg('Olá! Estou aqui para te fazer pensar, não para te dar a resposta. Lê o código com calma e diz-me: o que achas que ele devia fazer?', 'mentor');

  async function mentorReply(userText){
    typingEl.classList.add('on');
    let reply;
    if(DEMO){
      await new Promise(r => setTimeout(r, 900));
      reply = demoMentorChat(userText, failedAttempts);
    } else {
      const res = await fetch(`${API}/mentor/chat`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ challengeId:c.id, message:userText,
          code:editor.value, failedAttempts })});
      reply = (await res.json()).reply;
    }
    typingEl.classList.remove('on');
    chatMsg(reply, 'mentor');
  }
  function sendChat(){
    const input = document.getElementById('chat-in');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    chatMsg(text, 'user');
    mentorReply(text);
  }
  document.getElementById('chat-send').onclick = sendChat;
  document.getElementById('chat-in').onkeydown = e => { if(e.key==='Enter') sendChat(); };

  document.getElementById('chat-hint').onclick = async () => {
    let level = Math.min(hintsUsed, 3);
    if(level===3 && failedAttempts<3){
      level = 2;
      chatMsg('Explicação direta bloqueada — tenta executar pelo menos 3 vezes primeiro. Fico-me pelo conceito:', 'mentor', 'anti-vibecoding');
    }
    typingEl.classList.add('on');
    await new Promise(r => setTimeout(r, 700));
    typingEl.classList.remove('on');
    hintsUsed++;
    updateHintInfo();
    chatMsg(c.hints[level], 'mentor', LEVEL_NAMES[level]);
  };

  document.getElementById('run').onclick = async () => {
    const code = editor.value;
    term('> a compilar e executar no sandbox…', 'sys');
    let response;
    if(DEMO){
      await new Promise(r => setTimeout(r, 700));
      const ok = active.solvedIf(code);
      response = ok ? { solved:true, stdout:active.expected }
                    : { solved:false, stdout:'', stderr:active.bugOutput };
    } else {
      const res = await fetch(`${API}/challenges/${c.id}/submit`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ code, language:activeLang }) });
      response = await res.json();
    }
    recordAttempt(c.concept, response.solved);
    if(response.solved){
      const first = !state.solved.has(c.id);
      state.solved.add(c.id);
      const pts = Math.max(Math.round(c.points * Math.max(1-hintsUsed*0.2, 0.2)), 1);
      term(response.stdout);
      term(`✓ BUG CAÇADO — +${first?pts:0} pts (${hintsUsed} dica${hintsUsed===1?'':'s'})`, 'ok');
      if(first){
        state.totalSolved++;
        if(hintsUsed===0) state.noHintSolves++;
        if(c.area==='seguranca') state.securitySolved++;
        state.maxFails = Math.max(state.maxFails, failedAttempts);
        grantXp(pts, activeLang);
        checkBadges();
      }
      chatMsg('Boa caçada! 🐛 Antes de ires: consegues explicar-me numa frase porque é que o bug acontecia? Explicar é a melhor forma de consolidar.', 'mentor');
    } else {
      failedAttempts++;
      if(response.stdout) term(response.stdout);
      term(response.stderr || 'output diferente do esperado', 'err');
      term(`tentativa falhada #${failedAttempts}`, 'sys');
    }
  };
}

function demoMentorChat(text, failed){
  const t = text.toLowerCase();
  if(/resposta|solu[çc][aã]o|diz[\s-]*me|d[áa][\s-]*me|c[óo]digo pronto/.test(t))
    return 'Não te vou dar a resposta — não aprenderias nada. Mas diz-me: qual foi a última coisa que a consola te disse, e o que achas que significa?';
  if(/n[aã]o sei|n[aã]o percebo|ajuda|perdido|dif[íi]cil/.test(t))
    return failed >= 2
      ? 'Já tentaste ' + failed + ' vezes — isso é persistência, não fracasso. Qual é a linha de que mais suspeitas, e porquê?'
      : 'Vamos por partes. Executa o código como está e olha para o erro na consola — qual é a palavra mais importante nessa mensagem?';
  if(/ciclo|for|loop|[íi]ndice|index|while/.test(t))
    return 'Boa direção. Segue o valor da variável do ciclo iteração a iteração — o que vale ela na ÚLTIMA passagem?';
  if(/string|equals|==/.test(t))
    return 'Estás perto. Pergunta-te: esse operador compara o CONTEÚDO ou a IDENTIDADE dos objetos?';
  if(/firewall|regra|porta/.test(t))
    return 'Pensa como o tráfego: entra um pacote, percorre as regras de cima para baixo. Qual é a PRIMEIRA regra que lhe faz match?';
  if(/porqu[eê]/.test(t))
    return 'Excelente pergunta — é exatamente essa que quero que respondas tu. Que hipótese tens? Testa-a: muda uma coisa, executa, observa.';
  return 'Interessante. E se testasses essa ideia? Faz a alteração, corre no sandbox, e conta-me o que a consola disse.';
}

/* ================= CADERNO DE ESTUDO ================= */
function renderCaderno(){
  const diary = Object.entries(state.errors)
      .filter(([,e]) => e.errors > 0)
      .sort((a,b) => b[1].errors - a[1].errors);
  const review = diary.slice(0, 3);

  const DIARY_NOTES = {
    'ciclos':'Padrão detetado: condições de paragem. Verifica sempre o valor da variável na última iteração.',
    'strings':'Padrão detetado: comparação por identidade vs conteúdo.',
    'seguranca-input':'Padrão detetado: confiar no input. Regra de ouro: valida sempre à entrada.',
    'seguranca-rede':'Padrão detetado: ordem das regras. Em first-match, a ordem É a política.',
    'funcoes':'Padrão detetado: estado partilhado inesperado entre chamadas.',
    'closures':'Padrão detetado: scope de variáveis capturadas.',
    'seguranca-segredos':'Padrão detetado: segredos no código. Env vars sempre.',
  };

  app.innerHTML = `
    <h2>Caderno de Estudo <small>· o teu diário de erros e notas pessoais</small></h2>
    <section class="panel">
      <h2 style="font-size:17px">Para rever hoje <small>· spaced repetition</small></h2>
      ${review.length ? review.map(([cc]) => `
        <div class="diary-row">
          <span class="cc">#${cc}</span>
          <span class="note">a memória esquece — o algoritmo não. Revê antes que o intervalo cresça.</span>
          <a href="#/area/${cc.startsWith('seguranca')?'seguranca':'logica'}"><button class="ghost" style="padding:5px 12px;font-size:11px">rever agora</button></a>
        </div>`).join('')
      : '<p class="empty">Nada para rever — a caçada continua limpa. Volta amanhã.</p>'}
    </section>
    <section class="panel">
      <h2 style="font-size:17px">Diário de erros <small>· construído automaticamente a partir das tuas tentativas</small></h2>
      ${diary.length ? diary.map(([cc,e]) => `
        <div class="diary-row">
          <span class="cc">#${cc}</span>
          <span class="note">${DIARY_NOTES[cc] || 'erros registados — o mentor vai adaptar as explicações a este padrão.'}<br>
            <span style="color:var(--ink-dim);opacity:.7">último erro: ${e.last} · ${e.attempts} tentativas</span></span>
          <span class="rt">${Math.round(e.errors/e.attempts*100)}% erro</span>
        </div>`).join('')
      : '<p class="empty">Ainda sem erros registados nesta sessão. Vai caçar uns bugs — errar aqui é aprender.</p>'}
    </section>
    <section class="panel mynotes">
      <h2 style="font-size:17px">As minhas notas</h2>
      <div id="notes-list">${state.notes.map(n => `<div class="n">${escapeHtml(n)}</div>`).join('')}</div>
      <div class="addnote">
        <input type="text" id="note-in" placeholder="escreve uma nota de estudo…" aria-label="Nova nota">
        <button id="note-add">guardar</button>
      </div>
    </section>`;

  document.getElementById('note-add').onclick = () => {
    const inp = document.getElementById('note-in');
    const v = inp.value.trim();
    if(!v) return;
    state.notes.unshift(v);
    inp.value = '';
    renderCaderno();
  };
  document.getElementById('note-in').onkeydown = e => {
    if(e.key==='Enter') document.getElementById('note-add').click();
  };
}

/* ================= COMUNIDADE ================= */
function renderComunidade(){
  app.innerHTML = `
    <h2>Comunidade <small>· partilha código com bugs, ajuda e sê ajudado — à socrática</small></h2>
    <section class="panel newpost">
      <h2 style="font-size:17px">Publicar um bug</h2>
      <div class="row">
        <input type="text" id="np-title" placeholder="título — descreve o sintoma" aria-label="Título">
        <select id="np-lang" aria-label="Linguagem">
          <option>JAVA</option><option>PYTHON</option><option>JAVASCRIPT</option>
        </select>
      </div>
      <textarea class="field" id="np-code" placeholder="cola aqui o código com o bug…" aria-label="Código"></textarea>
      <input type="text" id="np-desc" placeholder="o que devia acontecer vs o que acontece" aria-label="Descrição">
      <div class="row">
        <button id="np-send">publicar</button>
        <span class="note" style="font-size:11px;color:var(--ink-dim);align-self:center">
          regra da comunidade: respostas guiam, não resolvem — como o mentor</span>
      </div>
    </section>
    <div id="feed">${state.posts.map(postHtml).join('')}</div>`;

  document.getElementById('np-send').onclick = () => {
    const title = document.getElementById('np-title').value.trim();
    const code = document.getElementById('np-code').value.trim();
    const desc = document.getElementById('np-desc').value.trim();
    if(!title || !code){ toast('<b>⚠</b> falta o título ou o código'); return; }
    const post = { id:'p'+Date.now(), author:'tu', lang:document.getElementById('np-lang').value,
      title, code, desc, likes:0, replies:[] };
    state.posts.unshift(post);
    renderComunidade();
    toast('<b>✓ publicado</b> — a comunidade foi notificada');
    if(DEMO) setTimeout(() => {
      post.replies.push({ author:'mentor',
        text:'Primeira pergunta para te desbloquear: qual é a linha onde o comportamento real diverge do esperado? Coloca um print antes e depois dela.' });
      if(location.hash === '#/comunidade') renderComunidade();
    }, 2500);
  };

  document.querySelectorAll('[data-like]').forEach(b => b.onclick = () => {
    const p = state.posts.find(x => x.id===b.dataset.like);
    p.likes++; renderComunidade();
  });
  document.querySelectorAll('[data-reply]').forEach(b => b.onclick = () => {
    const p = state.posts.find(x => x.id===b.dataset.reply);
    const text = prompt('A tua resposta (guia, não resolvas):');
    if(text && text.trim()){ p.replies.push({author:'tu', text:text.trim()}); renderComunidade(); }
  });
}
function postHtml(p){
  return `
    <div class="post">
      <div class="phead">
        <b>${escapeHtml(p.title)}</b>
        <span class="by">por ${escapeHtml(p.author)} · ${LANG_LABEL(p.lang)}</span>
      </div>
      <pre>${escapeHtml(p.code)}</pre>
      ${p.desc ? `<div class="pdesc">${escapeHtml(p.desc)}</div>` : ''}
      ${p.replies.map(r => `<div class="reply"><b>${escapeHtml(r.author)}</b> — ${escapeHtml(r.text)}</div>`).join('')}
      <div class="pfoot">
        <button class="ghost" data-like="${p.id}">▲ ${p.likes}</button>
        <button class="ghost" data-reply="${p.id}">responder</button>
        <span>${p.replies.length} resposta${p.replies.length===1?'':'s'}</span>
      </div>
    </div>`;
}

  const maxLangXp = Math.max(...Object.values(state.langXp), 1);

  app.innerHTML = `

      <div style="flex:1;min-width:220px">
        <h1>caçador_covas</h1>

        <div class="bigbar"><span style="transform:scaleX(${pct})"></span>
          <span class="txt">nível ${lvl} · ${state.xp - cur}/${next - cur} xp para o nível ${lvl+1}</span></div>
      </div>
    </div>
    <section class="panel">
      <h2 style="font-size:17px">Progressão por linguagem</h2>

        cada bug caçado numa linguagem alimenta a barra dessa linguagem</p>
    </section>
    <section class="panel">
      <h2 style="font-size:17px">Conquistas <small>· ${state.earned.size}/${BADGES.length}</small></h2>
      <div class="badges">
        ${BADGES.map(b => `
          <div class="badge ${state.earned.has(b.id)?'':'locked'}">
